<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelNataa - Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">TravelNataa</a>
      <button class="menu-toggle" aria-label="Buka menu">☰</button>
      <nav class="nav-menu">
        <a href="index.html"><img src="images/icon-home.svg" alt=""> Home</a>
        <a href="about.html"><img src="images/icon-about.svg" alt=""> About Us</a>
        <a href="contact.html"><img src="images/icon-contact.svg" alt=""> Contact</a>
        <a href="signin.html"><img src="images/icon-signin.svg" alt=""> Sign In</a>
        <a href="signup.html"><img src="images/icon-signup.svg" alt=""> Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="container auth-page">
    <section class="auth-card">
      <h1>Sign Up</h1>
      <p>Buat akun TravelNataa untuk mulai memesan paket perjalanan.</p>
      <form action="#" method="post">
        <div class="input-group">
          <label for="signup-name">Nama Lengkap</label>
          <input type="text" id="signup-name" name="name" placeholder="Nama lengkap" required>
        </div>
        <div class="input-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" placeholder="email@example.com" required>
        </div>
        <div class="input-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary">Daftar</button>
      </form>
      <p class="auth-note">Sudah punya akun? <a href="signin.html">Masuk di sini</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 TravelNataa. Halaman Sign Up.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
