<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelNataa - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">TravelNataa</a>
      <button class="menu-toggle" aria-label="Buka menu">☰</button>
      <nav class="nav-menu">
        <a href="index.html"><img src="images/icon-home.svg" alt=""> Home</a>
        <a href="about.html"><img src="images/icon-about.svg" alt=""> About Us</a>
        <a href="contact.html"><img src="images/icon-contact.svg" alt=""> Contact</a>
        <a href="signin.html"><img src="images/icon-signin.svg" alt=""> Sign In</a>
        <a href="signup.html"><img src="images/icon-signup.svg" alt=""> Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    <section class="page-section">
      <h1>Contact</h1>
      <p>Hubungi TravelNataa untuk bantuan perjalanan atau pertanyaan paket wisata.</p>
      <form class="contact-form" action="#" method="post">
        <div class="input-group">
          <label for="name">Nama</label>
          <input type="text" id="name" name="name" placeholder="Nama Anda" required>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>
        <div class="input-group">
          <label for="message">Pesan</label>
          <textarea id="message" name="message" rows="5" placeholder="Tulis pesan Anda..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Kirim Pesan</button>
      </form>
      <div class="contact-info">
        <div>
          <h2>Alamat Kantor</h2>
          <p>Jl. Bahagia Terus No. 27, Yogyakarta</p>
          <p>Telepon: +62 812-3456-7890</p>
          <p>Email: hello@travelnataa.com</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 TravelNataa. Halaman Contact.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
